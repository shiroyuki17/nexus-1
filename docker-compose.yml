services:
  mysql:
    image: mysql:8.4
    container_name: nexus-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: nexus_root_password
      MYSQL_DATABASE: nexus_1
    ports:
      - "3306:3306"
    volumes:
      - nexus_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pnexus_root_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: nexus-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        VITE_API_URL: /api
        VITE_API_TOKEN: local-dev-token
    container_name: nexus-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://root:nexus_root_password@mysql:3306/nexus_1
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_EXCHANGE: nexus.events
      RABBITMQ_AUDIT_QUEUE: nexus.audit.events
      RABBITMQ_ENABLED: "true"
      API_TOKEN: local-dev-token
      VITE_API_URL: /api
      VITE_API_TOKEN: local-dev-token
    ports:
      - "3000:3000"

volumes:
  nexus_mysql_data:
