services:
  - type: web
    name: nexus-gaming-center
    env: node
    plan: free
    buildCommand: npm run render-build
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: /api
      - key: DATABASE_URL
        sync: false
      - key: API_TOKEN
        sync: false
      - key: VITE_API_TOKEN
        sync: false
      - key: RABBITMQ_URL
        sync: false
      - key: RABBITMQ_EXCHANGE
        value: nexus.events
      - key: RABBITMQ_AUDIT_QUEUE
        value: nexus.audit.events
      - key: RABBITMQ_ENABLED
        value: "true"
      - key: DEFAULT_TENANT
        value: "default"
